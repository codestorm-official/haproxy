global
    maxconn 4096
    log stdout format raw local0
    log stdout format raw local1 notice

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend main
    bind *:80
    http-request return status 200 content-type text/plain string "HAProxy is running on Railway. Edit haproxy.cfg to proxy your backend services."

listen stats
    bind *:8404
    stats enable
    stats admin if TRUE
    stats uri /stats
