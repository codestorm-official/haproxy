global
    maxconn 4096
    log stdout format raw local0
    log stdout format raw local1 notice

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend main
    bind *:80

    # Example path for health check / landing page
    acl is_root path /
    http-request return status 200 content-type text/plain string "HAProxy is running on Railway. Edit haproxy.cfg to proxy your backend services." if is_root

    # Uncomment this after adding real backend servers
    # default_backend servers

# backend servers
#     balance roundrobin
#     server app1 your-service.railway.internal:3000 check maxconn 32
#     server app2 your-second-service.railway.internal:3000 check maxconn 32

listen stats
    bind *:8404
    stats enable
    stats admin if TRUE
    stats uri /stats