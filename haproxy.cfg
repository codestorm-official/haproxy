global
    maxconn 4096
    log stdout local0
    log stdout local1 notice
    daemon

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5000
    timeout client  50000
    timeout server  50000

# Simple frontend listening on port 80
frontend main
    bind *:80
    default_backend servers

# Backend with multiple servers
backend servers
    balance roundrobin
    # Example backend servers - modify as needed
    server server1 127.0.0.1:8001 check maxconn 32
    server server2 127.0.0.1:8002 check maxconn 32
    server server3 127.0.0.1:8003 check maxconn 32

# Optional: HAProxy Stats page on port 8404
listen stats
    bind *:8404
    stats enable
    stats admin if TRUE
    stats uri /stats
