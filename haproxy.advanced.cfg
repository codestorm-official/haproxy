# Example: HAProxy with HTTPS support
# This is an alternative configuration with SSL/TLS termination
# To use: cp haproxy.advanced.cfg haproxy.cfg

global
    maxconn 4096
    log stdout local0
    log stdout local1 notice
    daemon
    # SSL/TLS settings (uncomment if using certificates)
    # tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    http
    option  httplog
    option  denyclose
    option  forwardfor except 127.0.0.0/8
    timeout connect 5000
    timeout client  50000
    timeout server  50000
    retry-on conn-failure empty-response-only
    retries 3

# HTTP Frontend - redirect to HTTPS
frontend http
    bind *:80
    redirect scheme https code 301 if !{ ssl_fc }

# HTTPS Frontend (requires certificates)
# Uncomment and configure if using SSL
# frontend https
#     bind *:443 ssl crt /etc/ssl/certs/your-cert.pem
#     default_backend servers

# HTTP Backend (for non-HTTPS or internal)
frontend main_http
    bind *:8080
    default_backend servers

backend servers
    balance roundrobin
    # Add your backend servers here
    server server1 127.0.0.1:8001 check maxconn 32
    server server2 127.0.0.1:8002 check maxconn 32
    server server3 127.0.0.1:8003 check maxconn 32

# Stats page
listen stats
    bind *:8404
    stats enable
    stats admin if TRUE
    stats uri /stats
    stats refresh 30s

# TCP Load Balancing Example
# Uncomment to enable
# frontend tcp_in
#     bind *:3306
#     mode tcp
#     default_backend mysql_servers
